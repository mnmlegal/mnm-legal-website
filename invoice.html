<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MNM Invoice Generator</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="invoice.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<!-- ===========================
HEADER
=========================== -->

<header class="invoice-header">

<div class="header-left">

<img src="images/logo.png" alt="MNM Legal Logo">

<div>

<h2>MNM LEGAL ASSOCIATES</h2>

<p>Advocates & Legal Consultants</p>

</div>

</div>

<div class="header-right">

<a href="dashboard.html" class="back-btn">

<i class="fa-solid fa-arrow-left"></i>

Dashboard

</a>

</div>

</header>

<!-- ===========================
PAGE TITLE
=========================== -->

<section class="page-title">

<h1>Create New Invoice</h1>

<p>
Generate Professional Legal Invoice
</p>

</section>

<!-- ===========================
INVOICE FORM
=========================== -->

<div class="invoice-container">

<div class="invoice-card">

<div class="row">

<div class="form-group">

<label>Invoice No.</label>

<input
type="text"
id="invoiceNo"
readonly>

</div>

<div class="form-group">

<label>Date</label>

<input
type="date"
id="invoiceDate">

</div>

</div>

<div class="row">

<div class="form-group">

<label>Client Name</label>

<input
type="text"
id="clientName"
placeholder="Enter Client Name">

</div>

<div class="form-group">

<label>Mobile Number</label>

<input
type="tel"
id="clientMobile"
placeholder="9876543210">

</div>

</div>

<div class="form-group">

<label>Client Address</label>

<textarea
id="clientAddress"
rows="3"
placeholder="Enter Client Address"></textarea>

</div>

<hr>

<h2>Invoice Items</h2>

<table id="invoiceTable">

<thead>

<tr>

<th width="45%">Particular</th>

<th width="15%">Qty</th>

<th width="20%">Fee</th>

<th width="20%">Amount</th>

</tr>

</thead>

<tbody id="invoiceBody">

<tr>

<td>

<input
type="text"
placeholder="Legal Consultation">

</td>

<td>

<input
type="number"
value="1">

</td>

<td>

<input
type="number"
placeholder="1000">

</td>

<td>

₹0

</td>

</tr>

</tbody>

</table>

<button id="addRowBtn">

<i class="fa-solid fa-plus"></i>

Add New Item

</button>
