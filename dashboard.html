<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MNM Admin Panel</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
background:#000;
font-family:Poppins,sans-serif;
color:#fff;
}

.header{
background:#111;
border-bottom:2px solid #d4af37;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h2{
color:#d4af37;
margin:0;
}

.logout{
background:#d4af37;
color:#000;
padding:10px 18px;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.container{
max-width:1200px;
margin:50px auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#111;
border:1px solid #d4af37;
border-radius:15px;
padding:35px;
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px rgba(212,175,55,.3);
}

.card h3{
color:#d4af37;
margin-bottom:15px;
}

.card a{
display:inline-block;
margin-top:15px;
padding:10px 20px;
background:#d4af37;
color:#000;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

</style>

</head>

<body>

<script>

if(localStorage.getItem("loggedIn")!="yes"){
window.location.href="login.html";
}

function logout(){
localStorage.removeItem("loggedIn");
window.location.href="login.html";
}

</script>

<div class="header">

<h2>MNM LEGAL ADMIN PANEL</h2>

<a href="#" onclick="logout()" class="logout">
Logout
</a>

</div>

<div class="container">

<div class="grid">

<div class="card">
<h3>Invoice Generator</h3>
<p>Create Professional Bills</p>
<a href="invoice.html">Open</a>
</div>

<div class="card">
<h3>Blog Manager</h3>
<p>write Professional blog</p>
<a href="comming soon">Open</a>
</div>

</body>
</html>
